<!DOCTYPE html>
<html>
    <head>
        <title>My Portfolio<</title>
        <style>
            body {
                background-color: #f0f0f0;
                font-family: Arial, sans serif;

            }
            .container {
                max-width: 800px;
                margin: 0 auto;

            }

            button:hover {

    <body>

        <ul>
            <li>HTML</li>

        </ul>
        <h2> Contact Me</h2>

        <button onclick="contactMe()">Say Hello!</button>
        <p id="contactMessage"></p>
        </div>
        <script>
            function contactMe() {
                document.getElementById("contactMessage").innerText = "Thanks for reaching out! I'll get back to you soon";

</html>
